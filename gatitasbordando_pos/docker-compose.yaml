services:
  app:
    container_name: gatitasbordando-pos
    build:
      context: ../../projects/gatitasbordando-pos
      dockerfile: ../../projects/gatitasbordando-pos/Dockerfile
    networks:
      - proxy-network
    env_file:
      - .env
    volumes:
      - .:/app
    command: deno run -A main.ts