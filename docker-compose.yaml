

include:
  - portainer/docker-compose.yaml
  - nginx_proxy_manager/docker-compose.yaml
  - tailscale/docker-compose.yaml
  - immich/docker-compose.yaml
  - homeassistant/docker-compose.yaml
  - homarr/docker-compose.yaml
  - adguard/docker-compose.yaml
  - wordpress/docker-compose.yaml
  - terraria/docker-compose.yaml
  - vaultwarden/docker-compose.yaml
  - jellyfin/docker-compose.yaml
  - servarr/docker-compose.yaml
  - ../gatitasbordando-pos/docker-compose.yaml
  

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v2.7.1 # 
    container_name: mealie
    restart: always
    networks:
      - proxy-network
    deploy:
      resources:
        limits:
          memory: 1000M # 
    volumes:
      - mealie-data:/app/data/
    environment:
      # Set Backend ENV Variables Here
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: America/Santiago
  

volumes:
  mealie-data:

networks:
  proxy-network:


